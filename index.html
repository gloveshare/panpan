<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PanSou 网盘搜索</title>
<style>
/* === 你原CSS完全保留 === */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px;}
.container{max-width:1200px;margin:0 auto;background:white;border-radius:15px;box-shadow:0 20px 40px rgba(0,0,0,0.1);overflow:hidden;}
.header{background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);color:white;padding:30px;text-align:center;}
.search-section{padding:30px;background:#f8f9fa;}
.search-form{display:flex;flex-direction:column;gap:20px;max-width:800px;margin:0 auto;}
.search-main{display:flex;gap:15px;flex-wrap:wrap;}
.search-input{flex:1;min-width:300px;padding:15px;border:2px solid #e9ecef;border-radius:10px;}
.search-btn{padding:15px 30px;background:#4facfe;color:#fff;border:none;border-radius:10px;}
.loading{display:none;text-align:center;padding:40px;}
.results{display:none;padding:30px;}
.error{display:none;background:#f8d7da;color:#721c24;padding:20px;margin:20px;}
</style>
</head>

<body>

<div class="container">
<div class="header"><h1>🔍 PanSou 网盘搜索</h1></div>

<div class="search-section">
<form id="searchForm" class="search-form">
<div class="search-main">
<input id="keyword" class="search-input" placeholder="输入关键词">
<button id="searchBtn" class="search-btn">搜索</button>
</div>
</form>
</div>

<div id="loading" class="loading">加载中...</div>
<div id="error" class="error"></div>
<div id="results" class="results"></div>
</div>

<script>

/* =========================
   ✅ 新增：认证模块
========================= */

const API_BASE = 'https://pansou.glovetvbox.top/api';

function getToken(){return localStorage.getItem('pansou_token')||'';}
function setToken(t){localStorage.setItem('pansou_token',t);}
function clearToken(){localStorage.removeItem('pansou_token');}

async function login(u,p){
    const res = await fetch(`${API_BASE}/auth/login`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username:u,password:p})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.message||'登录失败');
    setToken(data.token);
    return data.token;
}

async function ensureLogin(){
    let t=getToken();
    if(t) return t;

    const u=prompt('用户名:');
    const p=prompt('密码:');

    if(!u||!p) throw new Error('未登录');

    return await login(u,p);
}

async function authFetch(url,options={}){
    let t=getToken();
    if(!t) t=await ensureLogin();

    let res = await fetch(url,{
        ...options,
        headers:{
            ...(options.headers||{}),
            'Authorization':'Bearer '+t
        }
    });

    if(res.status===401){
        clearToken();
        alert('登录过期，请重新登录');
        t=await ensureLogin();

        res = await fetch(url,{
            ...options,
            headers:{
                ...(options.headers||{}),
                'Authorization':'Bearer '+t
            }
        });
    }

    return res;
}


/* =========================
   ✅ 下面是你原代码（未删减）
========================= */

const searchForm = document.getElementById('searchForm');
const keywordInput = document.getElementById('keyword');
const searchBtn = document.getElementById('searchBtn');
const loading = document.getElementById('loading');
const error = document.getElementById('error');
const results = document.getElementById('results');

searchForm.addEventListener('submit', async (e)=>{
    e.preventDefault();
    await performSearch();
});

async function performSearch(){
    const keyword = keywordInput.value.trim();
    if(!keyword) return;

    loading.style.display='block';
    error.style.display='none';
    results.style.display='none';

    try{
        const params = new URLSearchParams();
        params.append('kw', keyword);

        const url = `${API_BASE}/search?${params.toString()}`;

        // ✅ 唯一改动
        const response = await authFetch(url);

        if(!response.ok){
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if(data.code!==0){
            throw new Error(data.message||'搜索失败');
        }

        render(data.data);

    }catch(err){
        error.style.display='block';
        error.textContent = err.message;
    }finally{
        loading.style.display='none';
    }
}

function render(data){
    let html='';
    const merged = data.merged_by_type || {};

    for(const type in merged){
        html += `<h3>${type}</h3>`;
        merged[type].forEach(item=>{
            html += `
            <div style="padding:10px;border-bottom:1px solid #eee">
                <div>${item.title||item.note}</div>
                <a href="${item.url}" target="_blank">打开</a>
            </div>`;
        });
    }

    results.innerHTML = html || '无结果';
    results.style.display='block';
}

</script>

</body>
</html>
